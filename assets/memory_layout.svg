<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#252525"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="300" rx="8" fill="url(#bg)"/>

  <text x="450" y="35" font-family="Segoe UI, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="600" letter-spacing="2">INLINE HOOK FLOW</text>
  <line x1="300" y1="48" x2="600" y2="48" stroke="#404040" stroke-width="1"/>

  <rect x="40" y="70" width="240" height="160" rx="4" fill="#2d2d2d" filter="url(#shadow)"/>
  <rect x="40" y="70" width="240" height="3" fill="#ffffff"/>
  <text x="160" y="98" font-family="Segoe UI, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="500">TARGET FUNCTION</text>
  <text x="160" y="116" font-family="Consolas, monospace" font-size="10" fill="#606060" text-anchor="middle">0xFFFF0000...</text>

  <rect x="55" y="128" width="210" height="42" rx="2" fill="#1e1e1e" stroke="#404040"/>
  <text x="160" y="150" font-family="Consolas, monospace" font-size="10" fill="#ffffff" text-anchor="middle">FF 25 xx xx xx xx</text>
  <text x="160" y="163" font-family="Segoe UI, sans-serif" font-size="9" fill="#606060" text-anchor="middle">JMP instruction (14 bytes)</text>

  <rect x="55" y="178" width="210" height="42" rx="2" fill="#1e1e1e" stroke="#404040"/>
  <text x="160" y="200" font-family="Consolas, monospace" font-size="10" fill="#c0c0c0" text-anchor="middle">function body...</text>
  <text x="160" y="213" font-family="Segoe UI, sans-serif" font-size="9" fill="#606060" text-anchor="middle">original code intact</text>

  <line x1="285" y1="145" x2="330" y2="145" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 2"/>
  <polygon points="330,145 322,140 322,150" fill="#ffffff"/>
  <text x="307" y="136" font-family="Segoe UI, sans-serif" font-size="9" fill="#808080" text-anchor="middle">JMP</text>

  <rect x="335" y="70" width="240" height="160" rx="4" fill="#2d2d2d" filter="url(#shadow)"/>
  <rect x="335" y="70" width="240" height="3" fill="#c0c0c0"/>
  <text x="455" y="98" font-family="Segoe UI, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="500">TRAMPOLINE</text>
  <text x="455" y="116" font-family="Consolas, monospace" font-size="10" fill="#606060" text-anchor="middle">near-allocated memory</text>

  <rect x="350" y="128" width="210" height="42" rx="2" fill="#1e1e1e" stroke="#7c7c7c"/>
  <text x="455" y="150" font-family="Consolas, monospace" font-size="10" fill="#ffffff" text-anchor="middle">relocated instructions</text>
  <text x="455" y="163" font-family="Segoe UI, sans-serif" font-size="9" fill="#606060" text-anchor="middle">RIP-relative fixed</text>

  <rect x="350" y="178" width="210" height="42" rx="2" fill="#1e1e1e" stroke="#ffffff"/>
  <text x="455" y="200" font-family="Consolas, monospace" font-size="10" fill="#ffffff" text-anchor="middle">JMP target + N</text>
  <text x="455" y="213" font-family="Segoe UI, sans-serif" font-size="9" fill="#606060" text-anchor="middle">return point</text>

  <line x1="580" y1="145" x2="625" y2="145" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 2"/>
  <polygon points="625,145 617,140 617,150" fill="#ffffff"/>
  <text x="602" y="136" font-family="Segoe UI, sans-serif" font-size="9" fill="#808080" text-anchor="middle">CALL</text>

  <rect x="630" y="70" width="240" height="160" rx="4" fill="#2d2d2d" filter="url(#shadow)"/>
  <rect x="630" y="70" width="240" height="3" fill="#808080"/>
  <text x="750" y="98" font-family="Segoe UI, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="500">YOUR DETOUR</text>
  <text x="750" y="116" font-family="Consolas, monospace" font-size="10" fill="#606060" text-anchor="middle">your hook handler</text>

  <rect x="645" y="128" width="210" height="95" rx="2" fill="#1e1e1e" stroke="#808080"/>
  <text x="750" y="152" font-family="Consolas, monospace" font-size="10" fill="#ffffff" text-anchor="middle">custom logic runs</text>
  <text x="750" y="172" font-family="Consolas, monospace" font-size="10" fill="#ffffff" text-anchor="middle">call Original()</text>
  <text x="750" y="192" font-family="Consolas, monospace" font-size="10" fill="#ffffff" text-anchor="middle">return to caller</text>

  <path d="M 750 235 Q 750 260 600 260 Q 450 260 300 260 Q 200 260 200 240" stroke="#ffffff" stroke-width="1" fill="none" stroke-dasharray="5 3"/>
  <text x="475" y="275" font-family="Segoe UI, sans-serif" font-size="9" fill="#606060" text-anchor="middle">original() returns here after trampoline</text>

  <line x1="40" y1="260" x2="860" y2="260" stroke="#404040" stroke-width="1"/>
  <text x="450" y="290" font-family="Segoe UI, sans-serif" font-size="10" fill="#606060" text-anchor="middle">min 14 bytes patched  ·  RIP-relative offsets corrected  ·  Jcc expanded to 32-bit</text>
</svg>