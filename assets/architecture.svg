  <text x="140" y="302" font-family="Consolas, monospace" font-size="11" fill="#c0c0c0">AllocTrampoline</text>
  <text x="140" y="322" font-family="Consolas, monospace" font-size="11" fill="#c0c0c0">SuspendThreads</text>

