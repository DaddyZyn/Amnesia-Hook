  <text x="540" y="302" font-family="Consolas, monospace" font-size="11" fill="#c0c0c0">HookD3D12</text>
  <text x="540" y="322" font-family="Consolas, monospace" font-size="11" fill="#c0c0c0">HookOpenGL</text>

  <line x1="100" y1="350" x2="800" y2="350" stroke="#404040" stroke-width="1"/>
  <text x="450" y="375" font-family="Segoe UI, sans-serif" font-size="11" fill="#606060" text-anchor="middle">recursive_mutex  ·  atomic_flag  ·  thread_local</text>
