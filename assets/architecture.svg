  </defs>

  <rect width="900" height="400" rx="8" fill="url(#bg)"/>

  <text x="450" y="40" font-family="Segoe UI, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="600" letter-spacing="2">HOOKMANAGER</text>
  <line x1="300" y1="55" x2="600" y2="55" stroke="#404040" stroke-width="1"/>

  <circle cx="450" cy="95" r="16" fill="#2d2d2d" stroke="#ffffff" stroke-width="2"/>
