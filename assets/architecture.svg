  <text x="340" y="302" font-family="Consolas, monospace" font-size="11" fill="#c0c0c0">TLS ThreadState</text>
  <text x="340" y="322" font-family="Consolas, monospace" font-size="11" fill="#c0c0c0">AtomicSpinlock</text>

